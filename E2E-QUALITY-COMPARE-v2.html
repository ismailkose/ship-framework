<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ship Framework - E2E Quality Comparison</title>
<style>
:root{--bg:#0f1419;--surface:#1a1f2e;--border:#2a3142;--text:#e4e6eb;--muted:#8b92a0;--accent:#2563eb;--green:#10b981;--red:#ef4444;--amber:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.container{max-width:1600px;margin:0 auto;padding:20px}
h1{font-size:22px;margin-bottom:4px}
.subtitle{color:var(--muted);font-size:14px;margin-bottom:20px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap}
.tab{padding:10px 18px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.panel-head{background:#131823;padding:14px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px}
.panel-body{padding:16px}
.label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.context{background:#131823;border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:12px;font-size:12px;line-height:1.6;color:var(--muted)}
textarea{width:100%;height:180px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:10px;font-family:Monaco,Menlo,monospace;font-size:11px;resize:vertical}
.btn{display:inline-block;padding:8px 16px;border:none;border-radius:4px;font-size:13px;font-weight:500;cursor:pointer}
.btn-primary{background:var(--accent);color:white}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#374151;color:var(--text)}
.btn-secondary:hover{background:#4b5563}
.btn-green{background:#059669;color:white}
.btn-green:hover{background:#047857}
.btn-row{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap;align-items:center}
.marker{display:flex;align-items:center;gap:10px;padding:5px 10px;margin:2px 0;background:#131823;border-radius:4px;font-size:12px;border-left:3px solid var(--border)}
.marker.pass{border-left-color:var(--green)}.marker.fail{border-left-color:var(--red)}
.marker .icon{width:18px;text-align:center}.marker .name{flex:1}
.marker .cat{font-size:11px;color:var(--muted);background:var(--bg);padding:1px 6px;border-radius:3px}
table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:8px;overflow:hidden;margin-top:16px}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:12px}
th{background:#131823;font-weight:600}
.cell-pass{color:var(--green)}.cell-fail{color:var(--red)}
.verdict-box{padding:14px;border-radius:6px;margin:16px 0;font-weight:600;font-size:15px;text-align:center}
.verdict-pass{background:#064e3b;color:#86efac;border:1px solid var(--green)}
.verdict-warn{background:#78350f;color:#fcd34d;border:1px solid var(--amber)}
.verdict-fail{background:#7f1d1d;color:#fca5a5;border:1px solid var(--red)}
.score-circle{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;margin:6px auto}
.sc-green{background:#064e3b;color:#86efac;border:2px solid var(--green)}
.sc-amber{background:#78350f;color:#fcd34d;border:2px solid var(--amber)}
.sc-red{background:#7f1d1d;color:#fca5a5;border:2px solid var(--red)}
.hidden{display:none}
.toast{position:fixed;bottom:20px;right:20px;background:#059669;color:white;padding:10px 20px;border-radius:6px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.error-banner{background:#7f1d1d;color:#fca5a5;border:1px solid var(--red);padding:12px;border-radius:6px;margin-bottom:16px;font-size:13px}
.upload-label{cursor:pointer}
.upload-label input[type="file"]{display:none}
</style>
</head>

<script>
if (typeof PROMPTS === "undefined" || typeof MARKERS === "undefined") {
  document.getElementById("load-error").classList.remove("hidden");
}

var SCENARIOS = [
  { id: "plan", title: "/ship-plan", desc: "Build a focus timer for remote workers. 25-min sessions with visual countdown ring.", project: "FocusFlow iOS app, SwiftUI, SwiftData, dark-first amber accent" },
  { id: "review", title: "/ship-review", desc: "Full review on FocusTimerView.swift (16 planted bugs)", project: "FocusFlow iOS, buggy timer view with intentional slop" },
  { id: "build", title: "/ship-build", desc: "Build the focus timer screen — core UI with countdown ring", project: "FocusFlow iOS, first build item from plan" },
  { id: "team", title: "/ship-team", desc: "Full team run — plan, build, review a focus timer", project: "FocusFlow iOS, end-to-end team orchestration" },
  { id: "fix", title: "/ship-fix", desc: "Timer keeps running after navigating away", project: "FocusFlow iOS, timer lifecycle bug" },
  { id: "launch", title: "/ship-launch", desc: "Deploy the focus timer to production", project: "FocusFlow iOS, shipping checklist" },
  { id: "think", title: "/ship-think", desc: "Validate: focus timer for remote workers worth building?", project: "FocusFlow idea validation" }
];

// Build tabs and scenario panels dynamically
var tabBar = document.getElementById("tab-bar");
var container = document.getElementById("scenarios-container");

SCENARIOS.forEach(function(s, idx) {
  var btn = document.createElement("button");
  btn.className = "tab" + (idx === 0 ? " active" : "");
  btn.id = "tab-btn-" + s.id;
  btn.textContent = s.title;
  btn.onclick = function() { doSwitchTab(s.id); };
  tabBar.appendChild(btn);

  var mc = MARKERS[s.id] ? MARKERS[s.id].length : 0;
  var div = document.createElement("div");
  div.id = "tab-" + s.id;
  if (idx > 0) div.className = "hidden";
  div.innerHTML = '<div class="context"><strong>Scenario:</strong> ' + s.desc + '<br><strong>Project:</strong> ' + s.project + '<br><strong>Markers:</strong> ' + mc + ' quality checks</div>'
    + '<div class="grid">'
    + buildPanel("before", s.id, "BEFORE")
    + buildPanel("after", s.id, "AFTER")
    + '</div>'
    + '<div class="btn-row" style="justify-content:center;margin-top:16px"><button class="btn btn-green" onclick="doScoreBoth(\'' + s.id + '\')" style="padding:12px 32px;font-size:15px">Score Both Outputs</button></div>'
    + '<div id="' + s.id + '_comparison" class="hidden"></div>';
  container.appendChild(div);
});

function buildPanel(side, scenario, label) {
  var key = side + "_" + scenario;
  return '<div class="panel"><div class="panel-head">' + label + '</div><div class="panel-body">'
    + '<div class="btn-row"><button class="btn btn-primary" onclick="doCopyPrompt(\'' + key + '\')">Copy Prompt</button>'
    + '<label class="btn btn-secondary upload-label"><input type="file" accept=".md,.txt" onchange="doLoadFile(this,\'' + key + '_output\')">Upload .md</label>'
    + '</div>'
    + '<textarea id="' + key + '_output" placeholder="Upload .md file or paste output here"></textarea>'
    + '<div id="' + key + '_markers" class="marker-list"></div>'
    + '</div></div>';
}

function doSwitchTab(tab) {
  SCENARIOS.forEach(function(s) {
    document.getElementById("tab-" + s.id).classList.toggle("hidden", s.id !== tab);
    document.getElementById("tab-btn-" + s.id).classList.toggle("active", s.id === tab);
  });
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 2500);
}

function doLoadFile(input, textareaId) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById(textareaId).value = e.target.result;
    showToast("Loaded " + file.name + " (" + Math.round(file.size / 1000) + "K)");
  };
  reader.readAsText(file);
}

function fallbackCopy(text) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.cssText = "position:fixed;top:0;left:0;opacity:0";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  var ok = false;
  try { ok = document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(ta);
  return ok;
}

function doCopyPrompt(key) {
  if (typeof PROMPTS === "undefined") { showToast("Data not loaded!"); return; }
  var text = PROMPTS[key];
  if (!text) { showToast("Prompt key not found: " + key); return; }
  var size = Math.round(text.length / 1000) + "K chars";
  if (navigator.clipboard && navigator.clipboard.writeText && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(function() {
      showToast("Prompt copied! (" + size + ")");
    }, function() {
      if (fallbackCopy(text)) showToast("Prompt copied! (" + size + ")");
      else { showToast("Select all + copy from box below"); document.getElementById(key + "_output").value = text; }
    });
  } else {
    if (fallbackCopy(text)) {
      showToast("Prompt copied! (" + size + ")");
    } else {
      showToast("Select all + copy from box below");
      var box = document.getElementById(key + "_output");
      if (box) { box.value = text; box.focus(); box.select(); }
    }
  }
}

function checkMarker(text, patternStr) {
  var isAnti = patternStr.charAt(0) === "!";
  if (isAnti) patternStr = patternStr.substring(1);
  var parts = patternStr.split("|");
  var found = false;
  for (var i = 0; i < parts.length; i++) {
    try {
      if (new RegExp(parts[i], "i").test(text)) { found = true; break; }
    } catch(e) {
      if (text.toLowerCase().indexOf(parts[i].toLowerCase()) !== -1) { found = true; break; }
    }
  }
  return isAnti ? !found : found;
}

function scoreOutput(text, scenario) {
  var markers = MARKERS[scenario];
  var results = [];
  for (var i = 0; i < markers.length; i++) {
    results.push({
      name: markers[i][0], pattern: markers[i][1], cat: markers[i][2],
      pass: text.trim().length > 0 ? checkMarker(text, markers[i][1]) : false
    });
  }
  return results;
}

function renderMarkers(containerId, results) {
  var el = document.getElementById(containerId);
  var pc = results.filter(function(r) { return r.pass; }).length;
  var h = "<div style='margin-bottom:6px;font-size:12px;color:var(--muted)'>" + pc + " / " + results.length + " markers detected</div>";
  for (var i = 0; i < results.length; i++) {
    var r = results[i];
    h += "<div class='marker " + (r.pass ? "pass" : "fail") + "'><span class='icon'>" + (r.pass ? "\u2705" : "\u274c") + "</span><span class='name'>" + r.name + "</span><span class='cat'>" + r.cat + "</span></div>";
  }
  el.innerHTML = h;
}

function doScoreBoth(scenario) {
  var bt = document.getElementById("before_" + scenario + "_output").value;
  var at = document.getElementById("after_" + scenario + "_output").value;
  if (!bt.trim() && !at.trim()) { showToast("Upload or paste at least one output first!"); return; }
  var br = scoreOutput(bt, scenario);
  var ar = scoreOutput(at, scenario);
  renderMarkers("before_" + scenario + "_markers", br);
  renderMarkers("after_" + scenario + "_markers", ar);
  var compEl = document.getElementById(scenario + "_comparison");
  compEl.classList.remove("hidden");
  var bp = br.filter(function(r) { return r.pass; }).length;
  var ap = ar.filter(function(r) { return r.pass; }).length;
  var total = br.length;
  var regs = 0, imps = 0;
  var h = "<table><tr><th style='width:35%'>Quality Marker</th><th style='width:10%'>Cat</th><th style='width:12%'>BEFORE</th><th style='width:12%'>AFTER</th><th style='width:20%'>Delta</th></tr>";
  for (var i = 0; i < total; i++) {
    var bv = br[i].pass, av = ar[i].pass;
    var bs = bv ? "<span class='cell-pass'>\u2705</span>" : "<span class='cell-fail'>\u274c</span>";
    var as2 = av ? "<span class='cell-pass'>\u2705</span>" : "<span class='cell-fail'>\u274c</span>";
    var d;
    if (bv && av) d = "<span style='color:var(--green)'>\u2261 Both pass</span>";
    else if (!bv && !av) d = "<span style='color:var(--muted)'>\u2261 Both miss</span>";
    else if (bv && !av) { d = "<span style='color:var(--red)'>\u25bc REGRESSION</span>"; regs++; }
    else { d = "<span style='color:var(--green)'>\u25b2 IMPROVEMENT</span>"; imps++; }
    h += "<tr><td>" + br[i].name + "</td><td>" + br[i].cat + "</td><td>" + bs + "</td><td>" + as2 + "</td><td>" + d + "</td></tr>";
  }
  h += "</table>";
  var bpct = bt.trim() ? Math.round(bp * 100 / total) : 0;
  var apct = at.trim() ? Math.round(ap * 100 / total) : 0;
  h += "<div style='display:flex;gap:24px;justify-content:center;margin-top:16px'>";
  h += "<div style='text-align:center'><div class='label'>BEFORE</div><div class='score-circle " + (bpct >= 80 ? "sc-green" : bpct >= 60 ? "sc-amber" : "sc-red") + "'>" + bpct + "%</div><div style='font-size:11px;color:var(--muted)'>" + bp + "/" + total + "</div></div>";
  h += "<div style='text-align:center'><div class='label'>AFTER</div><div class='score-circle " + (apct >= 80 ? "sc-green" : apct >= 60 ? "sc-amber" : "sc-red") + "'>" + apct + "%</div><div style='font-size:11px;color:var(--muted)'>" + ap + "/" + total + "</div></div></div>";
  var vc, vt;
  if (regs === 0) { vc = "verdict-pass"; vt = "\u2705 EQUIVALENT OR BETTER" + (imps > 0 ? " \u2014 " + imps + " improvement(s)" : "") + ", no regressions"; }
  else if (regs <= 2) { vc = "verdict-warn"; vt = "\u26a0\ufe0f MINOR GAPS \u2014 " + regs + " regression(s)"; }
  else { vc = "verdict-fail"; vt = "\u274c QUALITY REGRESSION \u2014 " + regs + " markers lost"; }
  h += "<div class='verdict-box " + vc + "'>" + vt + "</div>";
  h += "<div style='text-align:center;margin-top:8px'><button class='btn btn-secondary' onclick=\"doExportReport('" + scenario + "')\">Export Report</button></div>";
  compEl.innerHTML = h;
}

function doExportReport(scenario) {
  var bt = document.getElementById("before_" + scenario + "_output").value;
  var at = document.getElementById("after_" + scenario + "_output").value;
  var br = scoreOutput(bt, scenario);
  var ar = scoreOutput(at, scenario);
  var total = br.length;
  var bp = br.filter(function(r) { return r.pass; }).length;
  var ap = ar.filter(function(r) { return r.pass; }).length;
  var md = "# E2E Quality Report: /ship-" + scenario + "\nDate: " + new Date().toISOString().split("T")[0] + "\n\n";
  md += "| Marker | Before | After | Delta |\n|---|---|---|---|\n";
  for (var i = 0; i < total; i++) {
    var b = br[i].pass ? "PASS" : "MISS";
    var a = ar[i].pass ? "PASS" : "MISS";
    var d = (br[i].pass === ar[i].pass) ? "=" : (br[i].pass && !ar[i].pass ? "REGRESSION" : "IMPROVEMENT");
    md += "| " + br[i].name + " | " + b + " | " + a + " | " + d + " |\n";
  }
  md += "\n**Before:** " + bp + "/" + total + " (" + Math.round(bp * 100 / total) + "%)\n";
  md += "**After:** " + ap + "/" + total + " (" + Math.round(ap * 100 / total) + "%)\n";
  if (navigator.clipboard && navigator.clipboard.writeText && window.isSecureContext) {
    navigator.clipboard.writeText(md).then(function() { showToast("Report copied!"); });
  } else {
    if (fallbackCopy(md)) showToast("Report copied!");
    else { showToast("Copy failed"); console.log(md); }
  }
}
</script>
